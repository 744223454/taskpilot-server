openapi: 3.0.3
info:
  title: TaskPilot Server API
  version: 0.3.0
  description: |
    TaskPilot 当前已实现接口的 OpenAPI 规范。

    说明：
    - 本文件托管在 `taskpilot-server` 仓库内，适合直接导入 Apifox 调试或通过 GitHub Raw URL 持续同步
    - 当前已实现接口统一返回响应信封 `{ code, message, data }`，错误响应的 `data` 为 `null`
    - 未实现的业务接口（解析结果、项目、任务、历史等）暂未写入本规范
    - 业务错误码：0=ok, 10001=参数无效, 10002=未授权, 10003=邮箱已注册, 10004=数据库不可用, 10005=内部错误, 10006=资源不存在, 10007=资源冲突, 10008=状态非法, 10009=请求体过大
servers:
  - url: http://localhost:8888
    description: Local development server
tags:
  - name: System
    description: 系统与示例接口
  - name: Auth
    description: 认证接口
  - name: Documents
    description: 文档录入与查询
  - name: ParseJobs
    description: 解析任务创建与状态查询
paths:
  /healthz:
    get:
      tags:
        - System
      summary: 健康检查
      description: 返回服务是否存活，以及数据库连接是否已初始化。
      operationId: getHealthz
      responses:
        "200":
          description: 健康检查成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthEnvelope"
              examples:
                default:
                  value:
                    code: 0
                    message: ok
                    data:
                      status: ok
                      db: true
  /from/{name}:
    get:
      tags:
        - System
      summary: 示例接口
      description: 返回 `hello {name}` 的示例响应。
      operationId: getHelloFromName
      parameters:
        - name: name
          in: path
          required: true
          description: 示例名称
          schema:
            type: string
      responses:
        "200":
          description: 请求成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HelloEnvelope"
              examples:
                default:
                  value:
                    code: 0
                    message: ok
                    data:
                      message: hello zmk
        "500":
          description: 服务端错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                default:
                  value:
                    code: 10005
                    message: internal server error
                    data: null
  /api/v1/auth/register:
    post:
      tags:
        - Auth
      summary: 用户注册
      description: |
        注册新用户并签发 JWT。

        实际行为：
        - 服务端会对邮箱执行 `trim + lower`
        - 若邮箱已存在，返回 409
        - 成功时返回统一响应信封，`data` 为 `AuthResponse`
      operationId: postAuthRegister
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
            examples:
              default:
                value:
                  email: test@example.com
                  password: "12345678"
                  nickname: zmk
      responses:
        "201":
          description: 注册成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthEnvelope"
        "400":
          description: 请求参数校验失败
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                invalidRequest:
                  value:
                    code: 10001
                    message: "Key: 'RegisterRequest.Email' Error:Field validation for 'Email' failed on the 'email' tag"
                    data: null
        "409":
          description: 邮箱已注册
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                duplicatedEmail:
                  value:
                    code: 10003
                    message: email already registered
                    data: null
        "503":
          description: 数据库未连接
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                dbUnavailable:
                  value:
                    code: 10004
                    message: database not connected
                    data: null
        "500":
          description: 服务端错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                default:
                  value:
                    code: 10005
                    message: internal server error
                    data: null
  /api/v1/auth/login:
    post:
      tags:
        - Auth
      summary: 用户登录
      description: |
        使用邮箱和密码登录并签发 JWT。

        实际行为：
        - 服务端会对邮箱执行 `trim + lower`
        - 邮箱不存在和密码错误统一返回 401
      operationId: postAuthLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            examples:
              default:
                value:
                  email: test@example.com
                  password: "12345678"
      responses:
        "200":
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthEnvelope"
        "400":
          description: 请求参数校验失败
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                invalidRequest:
                  value:
                    code: 10001
                    message: "Key: 'LoginRequest.Email' Error:Field validation for 'Email' failed on the 'email' tag"
                    data: null
        "401":
          description: 邮箱或密码错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                invalidCredentials:
                  value:
                    code: 10002
                    message: invalid email or password
                    data: null
        "503":
          description: 数据库未连接
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                dbUnavailable:
                  value:
                    code: 10004
                    message: database not connected
                    data: null
        "500":
          description: 服务端错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                default:
                  value:
                    code: 10005
                    message: internal server error
                    data: null
  /api/v1/users/me:
    get:
      tags:
        - Auth
      summary: 获取当前用户
      description: |
        根据 `Authorization: Bearer <token>` 返回当前登录用户。

        实际行为：
        - `Bearer` 方案名大小写不敏感
        - token 缺失、无效、过期，或对应用户不存在时统一返回 401
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfileEnvelope"
              examples:
                default:
                  value:
                    code: 0
                    message: ok
                    data:
                      id: 1
                      email: test@example.com
                      nickname: zmk
                      avatar_url: null
        "401":
          description: 未授权
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                missingOrInvalidToken:
                  value:
                    code: 10002
                    message: invalid or missing access token
                    data: null
                userNotFound:
                  value:
                    code: 10002
                    message: invalid access token
                    data: null
        "503":
          description: 数据库未连接
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                dbUnavailable:
                  value:
                    code: 10004
                    message: database not connected
                    data: null
        "500":
          description: 服务端错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                default:
                  value:
                    code: 10005
                    message: internal server error
                    data: null
  /api/v1/documents/text:
    post:
      tags: [Documents]
      summary: 创建文本文档
      description: |
        接收用户粘贴的文本并创建文档，创建后状态为 `ready`。

        实际行为：
        - 请求体由中间件限制为最大 256 KiB，超限返回 413
        - `title` 必填且去空格后非空，`text` 必填且去空格后非空，字符数上限 50,000（按 Unicode 字符计）
        - 成功时 `data` 为 `Document`
      operationId: createTextDocument
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTextDocumentRequest"
            examples:
              default:
                value:
                  title: 比赛要求
                  text: 请于7月30日前提交项目说明书和演示视频
      responses:
        "201":
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentEnvelope"
        "400":
          description: 请求参数无效（字段缺失或校验失败）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                invalidInput:
                  value:
                    code: 10001
                    message: invalid input
                    data: null
                bindingError:
                  value:
                    code: 10001
                    message: "Key: 'CreateTextDocumentRequest.Text' Error:Field validation for 'Text' failed on the 'required' tag"
                    data: null
        "401":
          description: 未授权
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                unauthorized:
                  value:
                    code: 10002
                    message: invalid or missing access token
                    data: null
        "413":
          description: 请求体超过 256 KiB
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                payloadTooLarge:
                  value:
                    code: 10009
                    message: request body too large
                    data: null
        "503":
          description: 数据库未连接
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                dbUnavailable:
                  value:
                    code: 10004
                    message: database not connected
                    data: null
        "500":
          description: 服务端错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                default:
                  value:
                    code: 10005
                    message: internal server error
                    data: null
  /api/v1/documents:
    get:
      tags: [Documents]
      summary: 分页查询当前用户文档
      description: 返回当前用户的文档列表，按 `created_at DESC, id DESC` 排序，列表项不含正文。
      operationId: listDocuments
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          description: 页码，从 1 开始，缺省为 1
          schema:
            type: integer
            minimum: 1
            maximum: 1000000
            default: 1
        - name: page_size
          in: query
          description: 每页数量，缺省为 10
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
      responses:
        "200":
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentListEnvelope"
        "400":
          description: 分页参数无效
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                invalidPagination:
                  value:
                    code: 10001
                    message: "Key: 'DocumentListRequest.PageSize' Error:Field validation for 'PageSize' failed on the 'max' tag"
                    data: null
        "401":
          description: 未授权
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                unauthorized:
                  value:
                    code: 10002
                    message: invalid or missing access token
                    data: null
        "503":
          description: 数据库未连接
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                dbUnavailable:
                  value:
                    code: 10004
                    message: database not connected
                    data: null
        "500":
          description: 服务端错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                default:
                  value:
                    code: 10005
                    message: internal server error
                    data: null
  /api/v1/documents/{documentId}:
    parameters:
      - name: documentId
        in: path
        required: true
        description: 文档 ID
        schema:
          type: integer
          format: int64
          minimum: 1
    get:
      tags: [Documents]
      summary: 查询文档详情
      description: 返回文档详情，含正文 `content`（优先取 `text_input`，其次 `raw_text`）。
      operationId: getDocument
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentEnvelope"
        "400":
          description: 路径参数无效
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                invalidPathId:
                  value:
                    code: 10001
                    message: invalid input
                    data: null
        "401":
          description: 未授权
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                unauthorized:
                  value:
                    code: 10002
                    message: invalid or missing access token
                    data: null
        "404":
          description: 文档不存在或不属于当前用户
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                notFound:
                  value:
                    code: 10006
                    message: resource not found
                    data: null
        "503":
          description: 数据库未连接
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                dbUnavailable:
                  value:
                    code: 10004
                    message: database not connected
                    data: null
        "500":
          description: 服务端错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                default:
                  value:
                    code: 10005
                    message: internal server error
                    data: null
    delete:
      tags: [Documents]
      summary: 删除文档
      description: |
        软删除文档；存在 `pending` 或 `processing` 解析任务时返回 409，已生成的解析结果、项目和任务不受影响。
      operationId: deleteDocument
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyEnvelope"
        "400":
          description: 路径参数无效
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                invalidPathId:
                  value:
                    code: 10001
                    message: invalid input
                    data: null
        "401":
          description: 未授权
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                unauthorized:
                  value:
                    code: 10002
                    message: invalid or missing access token
                    data: null
        "404":
          description: 文档不存在或不属于当前用户
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                notFound:
                  value:
                    code: 10006
                    message: resource not found
                    data: null
        "409":
          description: 文档存在待处理或处理中的解析任务
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                activeParseJob:
                  value:
                    code: 10007
                    message: resource conflict
                    data: null
        "503":
          description: 数据库未连接
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                dbUnavailable:
                  value:
                    code: 10004
                    message: database not connected
                    data: null
        "500":
          description: 服务端错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                default:
                  value:
                    code: 10005
                    message: internal server error
                    data: null
  /api/v1/parse-jobs:
    post:
      tags: [ParseJobs]
      summary: 创建解析任务
      description: |
        为指定文档创建解析任务。

        实际行为：
        - 文档不存在或不属于当前用户返回 404
        - 文档状态不是 `ready` 返回 422
        - 文档已存在 `pending` 或 `processing` 任务返回 409（由文档行锁和部分唯一索引共同保证）
        - 创建成功后状态固定为 `pending`，后台 Redis worker 尚未接入
      operationId: createParseJob
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateParseJobRequest"
            examples:
              default:
                value:
                  document_id: 101
      responses:
        "201":
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParseJobEnvelope"
        "400":
          description: 请求参数无效
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                invalidRequest:
                  value:
                    code: 10001
                    message: "Key: 'CreateParseJobRequest.DocumentID' Error:Field validation for 'DocumentID' failed on the 'required' tag"
                    data: null
        "401":
          description: 未授权
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                unauthorized:
                  value:
                    code: 10002
                    message: invalid or missing access token
                    data: null
        "404":
          description: 文档不存在或不属于当前用户
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                documentNotFound:
                  value:
                    code: 10006
                    message: resource not found
                    data: null
        "409":
          description: 文档已有待处理或处理中的任务
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                activeJobExists:
                  value:
                    code: 10007
                    message: resource conflict
                    data: null
        "422":
          description: 文档状态不允许解析（需为 `ready`）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                invalidState:
                  value:
                    code: 10008
                    message: invalid resource state
                    data: null
        "503":
          description: 数据库未连接
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                dbUnavailable:
                  value:
                    code: 10004
                    message: database not connected
                    data: null
        "500":
          description: 服务端错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                default:
                  value:
                    code: 10005
                    message: internal server error
                    data: null
  /api/v1/parse-jobs/{jobId}:
    get:
      tags: [ParseJobs]
      summary: 查询解析任务
      description: 返回指定解析任务的状态与时间字段。
      operationId: getParseJob
      security:
        - bearerAuth: []
      parameters:
        - name: jobId
          in: path
          required: true
          description: 解析任务 ID
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "200":
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParseJobEnvelope"
        "400":
          description: 路径参数无效
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                invalidPathId:
                  value:
                    code: 10001
                    message: invalid input
                    data: null
        "401":
          description: 未授权
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                unauthorized:
                  value:
                    code: 10002
                    message: invalid or missing access token
                    data: null
        "404":
          description: 解析任务不存在或不属于当前用户
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                notFound:
                  value:
                    code: 10006
                    message: resource not found
                    data: null
        "503":
          description: 数据库未连接
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                dbUnavailable:
                  value:
                    code: 10004
                    message: database not connected
                    data: null
        "500":
          description: 服务端错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                default:
                  value:
                    code: 10005
                    message: internal server error
                    data: null
  /api/v1/parse-jobs/{jobId}/retry:
    post:
      tags: [ParseJobs]
      summary: 重试失败的解析任务
      description: |
        将 `failed` 状态的解析任务重置为 `pending`，`retry_count` 自增，并清空 `error_message`、`started_at`、`finished_at`。

        实际行为：
        - 任务不存在返回 404
        - 任务状态不是 `failed` 返回 422
        - 重置过程中触发活跃任务唯一约束时返回 409
      operationId: retryParseJob
      security:
        - bearerAuth: []
      parameters:
        - name: jobId
          in: path
          required: true
          description: 解析任务 ID
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "200":
          description: 已重置为 pending
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParseJobEnvelope"
        "400":
          description: 路径参数无效
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                invalidPathId:
                  value:
                    code: 10001
                    message: invalid input
                    data: null
        "401":
          description: 未授权
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                unauthorized:
                  value:
                    code: 10002
                    message: invalid or missing access token
                    data: null
        "404":
          description: 解析任务不存在或不属于当前用户
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                notFound:
                  value:
                    code: 10006
                    message: resource not found
                    data: null
        "409":
          description: 重置过程中触发活跃任务唯一约束
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                conflict:
                  value:
                    code: 10007
                    message: resource conflict
                    data: null
        "422":
          description: 只有 `failed` 状态可以重试
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                invalidState:
                  value:
                    code: 10008
                    message: invalid resource state
                    data: null
        "503":
          description: 数据库未连接
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                dbUnavailable:
                  value:
                    code: 10004
                    message: database not connected
                    data: null
        "500":
          description: 服务端错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                default:
                  value:
                    code: 10005
                    message: internal server error
                    data: null
  /api/v1/documents/{documentId}/latest-job:
    get:
      tags: [ParseJobs]
      summary: 查询文档最新解析任务
      description: 返回指定文档最近一次解析任务（按 `created_at DESC, id DESC`）。
      operationId: getLatestDocumentParseJob
      security:
        - bearerAuth: []
      parameters:
        - name: documentId
          in: path
          required: true
          description: 文档 ID
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "200":
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParseJobEnvelope"
        "400":
          description: 路径参数无效
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                invalidPathId:
                  value:
                    code: 10001
                    message: invalid input
                    data: null
        "401":
          description: 未授权
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                unauthorized:
                  value:
                    code: 10002
                    message: invalid or missing access token
                    data: null
        "404":
          description: 文档暂无解析任务
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                notFound:
                  value:
                    code: 10006
                    message: resource not found
                    data: null
        "503":
          description: 数据库未连接
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                dbUnavailable:
                  value:
                    code: 10004
                    message: database not connected
                    data: null
        "500":
          description: 服务端错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                default:
                  value:
                    code: 10005
                    message: internal server error
                    data: null
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Envelope:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: ok
    ErrorEnvelope:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          required:
            - data
          properties:
            code:
              type: integer
              example: 10002
            message:
              type: string
              example: invalid access token
            data:
              nullable: true
              example: null
    HealthPayload:
      type: object
      required:
        - status
        - db
      properties:
        status:
          type: string
          example: ok
        db:
          type: boolean
          example: true
    HealthEnvelope:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          required:
            - data
          properties:
            data:
              $ref: "#/components/schemas/HealthPayload"
    HelloResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: hello zmk
    HelloEnvelope:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          required:
            - data
          properties:
            data:
              $ref: "#/components/schemas/HelloResponse"
    RegisterRequest:
      type: object
      required:
        - email
        - password
        - nickname
      properties:
        email:
          type: string
          format: email
          example: test@example.com
        password:
          type: string
          minLength: 8
          example: "12345678"
        nickname:
          type: string
          minLength: 1
          maxLength: 64
          example: zmk
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: test@example.com
        password:
          type: string
          minLength: 8
          example: "12345678"
    UserProfile:
      type: object
      required:
        - id
        - email
        - nickname
      properties:
        id:
          type: integer
          format: int64
          example: 1
        email:
          type: string
          format: email
          example: test@example.com
        nickname:
          type: string
          example: zmk
        avatar_url:
          type: string
          nullable: true
          example: null
    AuthResponse:
      type: object
      required:
        - user
        - access_token
        - expires_in_sec
      properties:
        user:
          $ref: "#/components/schemas/UserProfile"
        access_token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.example
        expires_in_sec:
          type: integer
          format: int64
          example: 86400
    AuthEnvelope:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          required:
            - data
          properties:
            data:
              $ref: "#/components/schemas/AuthResponse"
    UserProfileEnvelope:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          required:
            - data
          properties:
            data:
              $ref: "#/components/schemas/UserProfile"
    CreateTextDocumentRequest:
      type: object
      required: [title, text]
      properties:
        title:
          type: string
          maxLength: 255
          example: 比赛要求
        text:
          type: string
          maxLength: 50000
          example: 请于7月30日前提交项目说明书和演示视频
    DocumentSummary:
      type: object
      required: [id, source_type, status, created_at, updated_at]
      properties:
        id:
          type: integer
          format: int64
        source_type:
          type: string
          enum: [pdf, text]
        title:
          type: string
          nullable: true
        file_name:
          type: string
          nullable: true
        file_url:
          type: string
          nullable: true
        page_count:
          type: integer
          format: int32
          nullable: true
        file_size:
          type: integer
          format: int64
          nullable: true
        status:
          type: string
          enum: [uploaded, ready, failed]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Document:
      allOf:
        - $ref: "#/components/schemas/DocumentSummary"
        - type: object
          properties:
            content:
              type: string
              nullable: true
    DocumentList:
      type: object
      required: [items, page, page_size, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/DocumentSummary"
        page:
          type: integer
        page_size:
          type: integer
        total:
          type: integer
          format: int64
    CreateParseJobRequest:
      type: object
      required: [document_id]
      properties:
        document_id:
          type: integer
          format: int64
          minimum: 1
    ParseJob:
      type: object
      required: [id, document_id, job_type, status, retry_count, created_at, updated_at]
      properties:
        id:
          type: integer
          format: int64
        document_id:
          type: integer
          format: int64
        job_type:
          type: string
          enum: [ai_parse]
        status:
          type: string
          enum: [pending, processing, success, failed]
        retry_count:
          type: integer
          format: int32
        error_message:
          type: string
          nullable: true
        started_at:
          type: string
          format: date-time
          nullable: true
        finished_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    DocumentEnvelope:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          required: [data]
          properties:
            data:
              $ref: "#/components/schemas/Document"
    DocumentListEnvelope:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          required: [data]
          properties:
            data:
              $ref: "#/components/schemas/DocumentList"
    ParseJobEnvelope:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          required: [data]
          properties:
            data:
              $ref: "#/components/schemas/ParseJob"
    EmptyEnvelope:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          required: [data]
          properties:
            data:
              type: object
